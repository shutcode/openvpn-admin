<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OVPN Admin</title>
<style>
:root {
  --bg-0:#07090c; --bg-1:#0a0c10; --bg-2:#0f131a; --bg-3:#141923; --bg-hover:#182030;
  --border:#1c2230; --border-strong:#2a3243; --border-bright:#384258;
  --fg-0:#e6ebf2; --fg-1:#b8c0cc; --fg-2:#6b7689; --fg-3:#4a5468;
  --accent:#6ce0d3; --accent-bg:rgba(108,224,211,0.08); --accent-border:rgba(108,224,211,0.35);
  --warn:#e9b96e; --warn-bg:rgba(233,185,110,0.08);
  --danger:#e07b7b; --danger-bg:rgba(224,123,123,0.08);
  --ok:#7bd88f; --ok-bg:rgba(123,216,143,0.08);
  --mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  --sans:'IBM Plex Sans',system-ui,-apple-system,sans-serif;
  --row-h:36px; --radius:3px; --radius-lg:6px;
}
*{box-sizing:border-box}
html,body,#root{height:100%;margin:0}
body{background:var(--bg-1);color:var(--fg-0);font-family:var(--mono);font-size:13px;line-height:1.45;font-feature-settings:'tnum' 1,'zero' 1;-webkit-font-smoothing:antialiased;overflow:hidden}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer;padding:0}
input,select,textarea{font:inherit;color:inherit}
a{color:var(--accent);text-decoration:none}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:var(--bg-1)}
::-webkit-scrollbar-thumb{background:var(--border-strong);border:2px solid var(--bg-1);border-radius:6px}

.app{display:grid;grid-template-columns:220px 1fr;grid-template-rows:38px 1fr 22px;grid-template-areas:"topbar topbar" "sidebar main" "statusbar statusbar";height:100vh}
.topbar{grid-area:topbar;display:flex;align-items:center;gap:16px;padding:0 14px;background:var(--bg-2);border-bottom:1px solid var(--border);font-size:12px}
.topbar .brand{display:flex;align-items:center;gap:10px;font-weight:600;letter-spacing:.02em}
.topbar .brand .mark{width:18px;height:18px;border:1px solid var(--accent);background:var(--accent-bg);display:grid;place-items:center;color:var(--accent);font-size:10px;font-weight:700}
.topbar .sep{color:var(--fg-3)}
.topbar .crumbs{color:var(--fg-2);display:flex;gap:8px;align-items:center}
.topbar .crumbs strong{color:var(--fg-0);font-weight:500}
.topbar .spacer{flex:1}
.topbar .meta{display:flex;gap:16px;align-items:center;color:var(--fg-2);font-size:11px}
.topbar .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);display:inline-block;margin-right:6px;box-shadow:0 0 8px var(--ok)}
.topbar .dot.off{background:var(--danger);box-shadow:0 0 8px var(--danger)}
.topbar .user{display:flex;align-items:center;gap:8px;padding:4px 10px;border:1px solid var(--border);background:var(--bg-3)}
.topbar .avatar{width:18px;height:18px;background:var(--accent-bg);color:var(--accent);display:grid;place-items:center;font-size:10px;border:1px solid var(--accent-border)}

.sidebar{grid-area:sidebar;background:var(--bg-2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.sidebar .section{padding:14px 12px 6px;font-size:10px;letter-spacing:.16em;color:var(--fg-3);text-transform:uppercase}
.nav{display:flex;flex-direction:column;padding:0 6px}
.nav .item{display:flex;align-items:center;gap:10px;padding:7px 10px;color:var(--fg-1);font-size:12.5px;border-radius:var(--radius);text-align:left;cursor:pointer;user-select:none;position:relative}
.nav .item:hover{background:var(--bg-hover);color:var(--fg-0)}
.nav .item.active{background:var(--accent-bg);color:var(--accent)}
.nav .item.active::before{content:"";position:absolute;left:-6px;top:4px;bottom:4px;width:2px;background:var(--accent)}
.nav .icon{width:14px;display:inline-block;text-align:center;color:var(--fg-3);font-size:11px}
.nav .item.active .icon{color:var(--accent)}
.nav .count{margin-left:auto;font-size:10.5px;color:var(--fg-3);background:var(--bg-3);border:1px solid var(--border);padding:1px 6px;border-radius:999px}
.nav .item.active .count{color:var(--accent);border-color:var(--accent-border);background:transparent}
.sidebar .footer{margin-top:auto;padding:10px 12px;border-top:1px solid var(--border);font-size:11px;color:var(--fg-2);display:grid;gap:4px}
.sidebar .footer .row{display:flex;justify-content:space-between}
.sidebar .footer .row span:last-child{color:var(--fg-1)}

.main{grid-area:main;overflow:auto;background:var(--bg-1)}
.statusbar{grid-area:statusbar;display:flex;align-items:center;gap:18px;padding:0 14px;background:var(--bg-2);border-top:1px solid var(--border);font-size:10.5px;color:var(--fg-2);letter-spacing:.04em}
.statusbar .ok{color:var(--ok)} .statusbar .accent{color:var(--accent)} .statusbar .warn{color:var(--warn)}
.statusbar .spacer{flex:1}
.statusbar .blink::after{content:"_";color:var(--accent);animation:blink 1.1s steps(2) infinite;margin-left:2px}
@keyframes blink{50%{opacity:0}}

.page{padding:18px 22px 32px}
.page__head{display:flex;align-items:flex-end;gap:16px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px dashed var(--border)}
.page__title{font-size:18px;font-weight:600;margin:0;display:flex;align-items:center;gap:10px}
.page__title .prompt{color:var(--accent);font-weight:500}
.page__sub{color:var(--fg-2);font-size:12px;margin-top:4px}
.page__actions{margin-left:auto;display:flex;gap:8px}

.btn{display:inline-flex;align-items:center;gap:7px;padding:6px 11px;border:1px solid var(--border-strong);background:var(--bg-3);color:var(--fg-0);font-size:12px;border-radius:var(--radius);cursor:pointer;height:30px;white-space:nowrap;transition:.12s}
.btn:hover{background:var(--bg-hover);border-color:var(--border-bright)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn--primary{background:var(--accent);color:#06201d;border-color:var(--accent);font-weight:600}
.btn--primary:hover{background:#8aebe0;border-color:#8aebe0}
.btn--ghost{background:transparent;border-color:var(--border)}
.btn--ghost:hover{background:var(--bg-hover)}
.btn--danger{color:var(--danger);border-color:rgba(224,123,123,0.3);background:var(--danger-bg)}
.btn--danger:hover{background:rgba(224,123,123,0.16);border-color:var(--danger)}
.btn--sm{height:26px;padding:4px 9px;font-size:11.5px}

.panel{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-lg)}
.panel__head{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--fg-2)}
.panel__head .actions{margin-left:auto;display:flex;gap:6px}
.panel__body{padding:14px}

.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;position:relative}
.stat .label{font-size:10.5px;text-transform:uppercase;color:var(--fg-2);letter-spacing:.14em;display:flex;align-items:center;gap:6px}
.stat .label .dot{width:6px;height:6px;border-radius:50%}
.stat .value{font-size:26px;font-weight:600;margin-top:6px;letter-spacing:-.01em;font-variant-numeric:tabular-nums}
.stat .delta{font-size:11px;color:var(--fg-2);margin-top:2px}
.two-col{display:grid;grid-template-columns:2fr 1fr;gap:14px}

.toolbar{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--border);background:var(--bg-2)}
.toolbar .search{flex:1;max-width:360px;position:relative}
.toolbar .search input{width:100%;height:28px;background:var(--bg-1);border:1px solid var(--border);color:var(--fg-0);padding:0 10px 0 28px;border-radius:var(--radius);outline:none;font-size:12px}
.toolbar .search input:focus{border-color:var(--accent-border);background:var(--bg-3)}
.toolbar .search .icon{position:absolute;left:10px;top:7px;color:var(--fg-3);font-size:11px}
.toolbar .filters{display:flex;gap:6px}
.toolbar .spacer{flex:1}

.chip{display:inline-flex;align-items:center;gap:6px;height:22px;padding:0 8px;border:1px solid var(--border);border-radius:999px;font-size:11px;color:var(--fg-1);background:var(--bg-3);cursor:pointer;user-select:none}
.chip:hover{background:var(--bg-hover)}
.chip.active{color:var(--accent);border-color:var(--accent-border);background:var(--accent-bg)}

.table-wrap{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
table.users{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
table.users th,table.users td{text-align:left;padding:0 12px;height:var(--row-h);font-size:12px;border-bottom:1px solid var(--border);white-space:nowrap}
table.users th{font-weight:500;color:var(--fg-2);background:var(--bg-2);position:sticky;top:0;font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;border-bottom:1px solid var(--border-strong);cursor:pointer;user-select:none}
table.users th:hover{color:var(--fg-0)}
table.users tbody tr:hover{background:var(--bg-hover)}
.cell-actions{width:1%}
.cell-actions .row-actions{display:flex;gap:2px;opacity:0;transition:opacity .1s}
table.users tbody tr:hover .row-actions{opacity:1}
.row-actions .btn{height:24px;padding:0 8px;background:transparent;border-color:transparent;color:var(--fg-2)}
.row-actions .btn:hover{color:var(--fg-0);background:var(--bg-3);border-color:var(--border-strong)}
.row-actions .btn.danger:hover{color:var(--danger);border-color:rgba(224,123,123,0.3)}

.badge{display:inline-flex;align-items:center;gap:6px;padding:1px 8px;border-radius:999px;font-size:11px;border:1px solid var(--border);background:var(--bg-3);color:var(--fg-1)}
.badge .dot{width:6px;height:6px;border-radius:50%}
.badge--online{color:var(--ok);border-color:rgba(123,216,143,0.3);background:var(--ok-bg)}
.badge--online .dot{background:var(--ok);box-shadow:0 0 6px var(--ok)}
.badge--offline{color:var(--fg-2)}
.badge--offline .dot{background:var(--fg-3)}
.badge--revoked{color:var(--danger);border-color:rgba(224,123,123,0.3);background:var(--danger-bg)}
.badge--revoked .dot{background:var(--danger)}
.badge--expiring{color:var(--warn);border-color:rgba(233,185,110,0.3);background:var(--warn-bg)}
.badge--expiring .dot{background:var(--warn)}
.user-cell{display:flex;align-items:center;gap:10px}
.user-cell .av{width:22px;height:22px;background:var(--bg-3);border:1px solid var(--border);display:grid;place-items:center;font-size:10px;color:var(--fg-1);border-radius:3px}
.user-cell .name{color:var(--fg-0)}
.muted{color:var(--fg-2)} .faint{color:var(--fg-3)} .tnum{font-variant-numeric:tabular-nums}

.log-stream{background:var(--bg-0);border:1px solid var(--border);border-radius:var(--radius-lg);font-size:12px;max-height:calc(100vh - 280px);overflow:auto}
.log-line{display:grid;grid-template-columns:160px 70px 1fr;gap:12px;padding:4px 14px;border-bottom:1px solid rgba(255,255,255,0.02)}
.log-line:hover{background:var(--bg-2)}
.log-line .ts{color:var(--fg-3)}
.log-line .lvl{font-weight:600}
.log-line .lvl--info{color:var(--accent)} .log-line .lvl--ok{color:var(--ok)}
.log-line .lvl--warn{color:var(--warn)} .log-line .lvl--err{color:var(--danger)}
.log-line .msg{color:var(--fg-1);white-space:pre-wrap}

.scrim{position:fixed;inset:0;background:rgba(2,4,8,0.6);backdrop-filter:blur(2px);z-index:50}
.modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:440px;background:var(--bg-2);border:1px solid var(--border-strong);border-radius:var(--radius-lg);z-index:60;box-shadow:0 24px 60px rgba(0,0,0,0.5)}
.modal .head{padding:14px 18px;border-bottom:1px solid var(--border)}
.modal .head .title{font-size:14px;font-weight:600}
.modal .body{padding:16px 18px}
.modal .foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;background:var(--bg-3)}

.field{display:grid;gap:6px;margin-bottom:14px}
.field .label{font-size:11px;color:var(--fg-2);text-transform:uppercase;letter-spacing:.1em}
.field .err{font-size:11px;color:var(--danger)}
.input{height:32px;background:var(--bg-1);border:1px solid var(--border-strong);color:var(--fg-0);padding:0 10px;border-radius:var(--radius);outline:none;font-family:var(--mono);font-size:12.5px;width:100%}
.input:focus{border-color:var(--accent);background:var(--bg-3)}

.toasts{position:fixed;right:18px;bottom:36px;display:flex;flex-direction:column;gap:8px;z-index:100}
.toast{display:flex;align-items:center;gap:10px;background:var(--bg-3);border:1px solid var(--border-strong);padding:9px 14px;border-radius:var(--radius);font-size:12px;color:var(--fg-0);min-width:260px;box-shadow:0 10px 30px rgba(0,0,0,0.4)}
.toast.ok{border-left:2px solid var(--ok)}
.toast.err{border-left:2px solid var(--danger)}
.toast.info{border-left:2px solid var(--accent)}

.auth{position:fixed;inset:0;background:var(--bg-0);display:grid;grid-template-columns:1fr 1fr;overflow:hidden}
.auth__left{padding:32px 40px;border-right:1px solid var(--border);background:var(--bg-1)}
.auth__brand{display:flex;align-items:center;gap:10px;font-weight:600}
.auth__brand .mark{width:28px;height:28px;border:1px solid var(--accent);background:var(--accent-bg);display:grid;place-items:center;color:var(--accent);font-size:14px;font-weight:700}
.auth__terminal{margin-top:60px;font-size:12px;line-height:1.7;color:var(--fg-1)}
.auth__terminal .line{white-space:pre}
.auth__terminal .ok{color:var(--ok)} .auth__terminal .accent{color:var(--accent)} .auth__terminal .warn{color:var(--warn)} .auth__terminal .muted{color:var(--fg-2)}
.auth__right{display:grid;place-items:center;padding:40px}
.auth__card{width:100%;max-width:380px}
.auth__title{font-size:22px;font-weight:600;margin:0 0 4px}
.auth__title .accent{color:var(--accent)}
.auth__sub{color:var(--fg-2);font-size:12px;margin-bottom:26px}

.kbd{font-size:10px;border:1px solid var(--border-strong);padding:1px 5px;border-radius:3px;color:var(--fg-2);background:var(--bg-1);margin-left:4px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:12px;height:12px;border:2px solid var(--border-strong);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;display:inline-block}

.kv{display:grid;grid-template-columns:130px 1fr;row-gap:8px;column-gap:16px;font-size:12.5px}
.kv dt{color:var(--fg-2);font-size:11px;text-transform:uppercase;letter-spacing:.08em}
.kv dd{margin:0;color:var(--fg-0)}
</style>
</head>
<body>
<div id="root"></div>
<script>
"use strict";
// ---------- API client ----------
const API = (() => {
  const TOKEN_KEY = "ovpn_admin_token";
  function token(){ return localStorage.getItem(TOKEN_KEY) || ""; }
  function setToken(t){ if(t) localStorage.setItem(TOKEN_KEY, t); else localStorage.removeItem(TOKEN_KEY); }
  async function call(method, path, body){
    const headers = { "Content-Type":"application/json" };
    const t = token();
    if (t) headers.Authorization = "Bearer " + t;
    const init = { method, headers };
    if (body !== undefined) init.body = JSON.stringify(body);
    const res = await fetch(path, init);
    const ct = res.headers.get("content-type") || "";
    let data = null;
    if (ct.includes("application/json")) data = await res.json();
    if (!res.ok){
      const msg = (data && (data.error || (data.data && data.data.error))) || res.statusText;
      const err = new Error(msg); err.status = res.status; throw err;
    }
    return data && data.success !== undefined ? data.data : data;
  }
  return {
    token, setToken,
    login: (u,p) => call("POST","/api/v1/login",{username:u,password:p}),
    me: () => call("GET","/api/v1/me"),
    dashboard: () => call("GET","/api/v1/dashboard"),
    users: () => call("GET","/api/v1/users"),
    addUser: (username) => call("POST","/api/v1/users",{username}),
    revokeUser: (cn) => call("DELETE","/api/v1/users/"+encodeURIComponent(cn)),
    sessions: () => call("GET","/api/v1/sessions"),
    logs: () => call("GET","/api/v1/logs"),
    configURL: (cn) => "/api/v1/users/"+encodeURIComponent(cn)+"/config",
  };
})();

// ---------- formatting helpers ----------
function fmtBytes(b){ if (!b) return "0 B"; const u=["B","KB","MB","GB","TB"]; let i=0; while(b>=1024&&i<u.length-1){b/=1024;i++;} return b.toFixed(i?1:0)+" "+u[i]; }
function fmtRel(d){ if(!d) return "—"; const t=(typeof d==="string"?new Date(d).getTime():d);
  const past = Date.now() >= t; const s = Math.floor(Math.abs(Date.now()-t)/1000);
  const suffix = past ? " ago" : "";
  const prefix = past ? "" : "in ";
  let v;
  if(s<60) v=s+"s"; else { const m=Math.floor(s/60); if(m<60) v=m+"m"; else { const h=Math.floor(m/60); if(h<24) v=h+"h"; else { const dd=Math.floor(h/24); if(dd<30) v=dd+"d"; else { const mo=Math.floor(dd/30); if(mo<12) v=mo+"mo"; else v=Math.floor(mo/12)+"y"; } } } }
  return prefix+v+suffix;
}
function fmtDate(d){ const x=new Date(typeof d==="string"?d:d); const p=n=>String(n).padStart(2,"0"); return `${x.getFullYear()}-${p(x.getMonth()+1)}-${p(x.getDate())} ${p(x.getHours())}:${p(x.getMinutes())}`; }
function escHTML(s){ return String(s==null?"":s).replace(/[&<>"']/g, c=>({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c])); }

// ---------- DOM helpers ----------
function h(tag, attrs={}, ...kids){
  const el = document.createElement(tag);
  for (const k in attrs){
    if (attrs[k]==null||attrs[k]===false) continue;
    if (k === "class") el.className = attrs[k];
    else if (k === "style") el.setAttribute("style", attrs[k]);
    else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else if (k === "html") el.innerHTML = attrs[k];
    else el.setAttribute(k, attrs[k]);
  }
  for (const k of kids.flat()){
    if (k==null||k===false) continue;
    el.append(k.nodeType ? k : document.createTextNode(k));
  }
  return el;
}
function clear(node){ while(node.firstChild) node.removeChild(node.firstChild); }

// ---------- toast ----------
const Toast = (() => {
  let host;
  function ensure(){ if(!host){ host = h("div",{class:"toasts"}); document.body.appendChild(host); } return host; }
  function show(kind, msg){
    const t = h("div",{class:"toast "+kind}, msg);
    ensure().appendChild(t);
    setTimeout(()=>t.remove(), 3500);
  }
  return { ok: m=>show("ok",m), err: m=>show("err",m), info: m=>show("info",m) };
})();

// ---------- state ----------
const state = {
  user: null,
  route: "dashboard",
  data: { users: [], sessions: [], logs: [], dashboard: null },
  filters: { userQ: "", userStatus: "all", logQ: "", logLvl: "all", sessQ: "" },
};

// ---------- render: shell ----------
function statusBadge(s, expSoon){
  if (s === "valid" && expSoon) return h("span",{class:"badge badge--expiring"}, h("span",{class:"dot"}), "expiring");
  if (s === "valid") return h("span",{class:"badge badge--online"}, h("span",{class:"dot"}), "valid");
  if (s === "revoked") return h("span",{class:"badge badge--revoked"}, h("span",{class:"dot"}), "revoked");
  return h("span",{class:"badge badge--offline"}, h("span",{class:"dot"}), s||"unknown");
}
function onlineBadge(online){
  return online
    ? h("span",{class:"badge badge--online"}, h("span",{class:"dot"}), "online")
    : h("span",{class:"badge badge--offline"}, h("span",{class:"dot"}), "offline");
}

function renderShell(){
  const NAV = [
    {id:"dashboard", label:"Dashboard", icon:"▤"},
    {id:"users", label:"Users", icon:"⌘", count:()=>state.data.users.length},
    {id:"sessions", label:"Sessions", icon:"⟳", count:()=>state.data.sessions.length},
    {id:"logs", label:"Logs", icon:"≡"},
  ];
  const dash = state.data.dashboard;
  const online = dash && dash.server && dash.server.online;

  const root = document.getElementById("root");
  clear(root);
  root.appendChild(
    h("div",{class:"app"},
      h("div",{class:"topbar"},
        h("div",{class:"brand"}, h("div",{class:"mark"},"▲"), h("span",null,"OVPN ADMIN")),
        h("span",{class:"sep"},"/"),
        h("div",{class:"crumbs"}, h("strong",null, NAV.find(n=>n.id===state.route)?.label || state.route)),
        h("div",{class:"spacer"}),
        h("div",{class:"meta"},
          h("span",null, h("span",{class:"dot"+(online?"":" off")}), "openvpn-server: " + (online?"running":"down")),
          h("span",null, dash && dash.server && dash.server.uptime ? "uptime " + dash.server.uptime : ""),
        ),
        h("div",{class:"user"},
          h("div",{class:"avatar"}, (state.user && state.user.username || "ad").slice(0,2).toUpperCase()),
          h("span",null, state.user && state.user.username || ""),
          h("button",{class:"btn btn--sm btn--ghost", onclick: signOut, title:"sign out", style:"height:22px;padding:0 8px"}, "sign out"),
        ),
      ),
      h("div",{class:"sidebar"},
        h("div",{class:"section"},"navigation"),
        h("div",{class:"nav"}, NAV.map(n =>
          h("button", { class: "item" + (state.route===n.id ? " active":""), onclick: () => navigate(n.id) },
            h("span",{class:"icon"}, n.icon),
            h("span",null, n.label),
            n.count ? h("span",{class:"count"}, String(n.count())) : null,
          )
        )),
        h("div",{class:"section"},"actions"),
        h("div",{class:"nav"},
          h("button",{class:"item", onclick: () => openAddUser()}, h("span",{class:"icon"},"+"), h("span",null,"Add user"), h("span",{class:"kbd",style:"margin-left:auto"},"N")),
          h("button",{class:"item", onclick: refresh}, h("span",{class:"icon"},"⟳"), h("span",null,"Refresh")),
        ),
        h("div",{class:"footer"},
          h("div",{class:"row"}, h("span",null,"vpn unit"), h("span",null, dash && dash.server ? dash.server.unit : "—")),
          h("div",{class:"row"}, h("span",null,"endpoint"), h("span",null, dash && dash.server && dash.server.endpoint || "udp/1194")),
          h("div",{class:"row"}, h("span",null,"subnet"), h("span",null, dash && dash.server && dash.server.subnet || "—")),
        ),
      ),
      h("div",{class:"main", id:"main"}),
      h("div",{class:"statusbar"},
        h("span", null, online ? h("span",{class:"ok"},"●") : h("span",{class:"warn"},"●"), " " + (online?"connected":"server down")),
        h("span", null, dash && dash.server && dash.server.cipher || ""),
        h("span", null, (state.data.sessions.length) + " sessions"),
        h("span", null, (state.data.users.filter(u=>u.status==="valid").length) + " valid certs"),
        h("span", {class:"spacer"}),
        h("span", {class:"accent blink"}, "ready"),
      ),
    )
  );
  renderRoute();
}

function navigate(id){ state.route = id; renderRoute(); refresh(true); }
function renderRoute(){
  const main = document.getElementById("main");
  if (!main) return;
  clear(main);
  switch (state.route){
    case "dashboard": renderDashboard(main); break;
    case "users": renderUsers(main); break;
    case "sessions": renderSessions(main); break;
    case "logs": renderLogs(main); break;
  }
}

// ---------- pages ----------
function renderDashboard(main){
  const d = state.data.dashboard || { server:{}, counts:{}, sessions:[] };
  main.appendChild(h("div",{class:"page"},
    h("div",{class:"page__head"},
      h("div",null,
        h("h1",{class:"page__title"}, h("span",{class:"prompt"},"$"), " dashboard"),
        h("div",{class:"page__sub"}, "real-time status of " + (d.server.unit || "openvpn-server")),
      ),
      h("div",{class:"page__actions"}, h("button",{class:"btn btn--ghost", onclick: refresh}, "↻ refresh")),
    ),
    h("div",{class:"stat-grid"},
      statTile("active sessions", d.counts.online || 0, "var(--ok)"),
      statTile("total clients", d.counts.total || 0, "var(--accent)"),
      statTile("certs expiring (30d)", d.counts.expiring || 0, "var(--warn)"),
      statTile("revoked", d.counts.revoked || 0, "var(--danger)"),
    ),
    h("div",{class:"two-col"},
      h("div",{class:"panel"},
        h("div",{class:"panel__head"}, h("span",null,"active sessions · top 8"),
          h("div",{class:"actions"}, h("button",{class:"btn btn--sm btn--ghost", onclick:()=>navigate("sessions")}, "view all →"))),
        h("div",{class:"panel__body", style:"padding:0"},
          buildSessionsTable((d.sessions||[]).slice(0,8))),
      ),
      h("div",{class:"panel"},
        h("div",{class:"panel__head"}, h("span",null,"server")),
        h("div",{class:"panel__body"},
          h("dl",{class:"kv"},
            h("dt",null,"unit"), h("dd",null, d.server.unit || "—"),
            h("dt",null,"online"), h("dd",null, d.server.online?"yes":"no"),
            h("dt",null,"uptime"), h("dd",null, d.server.uptime || "—"),
            h("dt",null,"cipher"), h("dd",null, d.server.cipher || "—"),
            h("dt",null,"subnet"), h("dd",null, d.server.subnet || "—"),
          ),
        ),
      ),
    ),
  ));
}
function statTile(label, value, dotColor){
  return h("div",{class:"stat"},
    h("div",{class:"label"}, h("span",{class:"dot",style:"background:"+dotColor}), label),
    h("div",{class:"value"}, String(value)),
  );
}

function buildSessionsTable(sessions){
  const head = h("thead", null, h("tr",null,
    h("th",null,"user"), h("th",null,"virtual ip"), h("th",null,"real ip"),
    h("th",{style:"text-align:right"},"↓ in"),
    h("th",{style:"text-align:right"},"↑ out"),
    h("th",null,"connected"),
    h("th",null,"cipher"),
  ));
  const body = h("tbody", null, sessions.map(s =>
    h("tr",null,
      h("td",null, h("span",{style:"color:var(--ok)"}, "●"), " ", s.user),
      h("td",{class:"tnum"}, s.virtual_ip),
      h("td",{class:"tnum muted"}, s.real_ip),
      h("td",{class:"tnum",style:"text-align:right"}, fmtBytes(s.bytes_in)),
      h("td",{class:"tnum",style:"text-align:right"}, fmtBytes(s.bytes_out)),
      h("td",{class:"muted"}, fmtRel(s.connected_at)),
      h("td",{class:"muted"}, s.cipher || ""),
    )
  ));
  if (!sessions.length){
    body.appendChild(h("tr",null,
      h("td",{colspan:7,style:"text-align:center;padding:24px;color:var(--fg-2)"}, "no active sessions")));
  }
  return h("table",{class:"users"}, head, body);
}

function renderSessions(main){
  const list = state.data.sessions || [];
  const q = state.filters.sessQ.toLowerCase();
  const filtered = list.filter(s => !q || s.user.toLowerCase().includes(q) || (s.real_ip||"").includes(q) || (s.virtual_ip||"").includes(q));
  main.appendChild(h("div",{class:"page"},
    h("div",{class:"page__head"},
      h("div",null,
        h("h1",{class:"page__title"}, h("span",{class:"prompt"},"$"), " sessions"),
        h("div",{class:"page__sub"}, list.length + " active connections · live status.log"),
      ),
      h("div",{class:"page__actions"}, h("button",{class:"btn btn--ghost", onclick:refresh}, "↻ refresh")),
    ),
    h("div",{class:"table-wrap"},
      h("div",{class:"toolbar"},
        h("div",{class:"search"},
          h("span",{class:"icon"},"⌕"),
          h("input",{placeholder:"filter by user, ip…", value: state.filters.sessQ,
            oninput: e => { state.filters.sessQ = e.target.value; renderRoute(); }}),
        ),
      ),
      h("div",{style:"max-height:calc(100vh - 260px); overflow:auto"}, buildSessionsTable(filtered)),
    ),
  ));
}

function renderUsers(main){
  const all = state.data.users || [];
  const q = state.filters.userQ.toLowerCase();
  const sf = state.filters.userStatus;
  const filtered = all.filter(u => {
    if (sf === "online" && !u.online) return false;
    if (sf === "valid" && u.status !== "valid") return false;
    if (sf === "revoked" && u.status !== "revoked") return false;
    if (sf === "expiring" && !(u.status==="valid" && u.cert_expires && (new Date(u.cert_expires).getTime() - Date.now()) < 30*86400000)) return false;
    if (q && !u.username.toLowerCase().includes(q) && !(u.static_ip||"").includes(q) && !(u.last_ip||"").includes(q)) return false;
    return true;
  });
  filtered.sort((a,b)=> a.username.localeCompare(b.username));

  main.appendChild(h("div",{class:"page"},
    h("div",{class:"page__head"},
      h("div",null,
        h("h1",{class:"page__title"}, h("span",{class:"prompt"},"$"), " users"),
        h("div",{class:"page__sub"}, filtered.length + " of " + all.length + " · imported live from /etc/openvpn/easy-rsa/pki/index.txt"),
      ),
      h("div",{class:"page__actions"}, h("button",{class:"btn btn--primary", onclick: openAddUser}, "+ add user")),
    ),
    h("div",{class:"table-wrap"},
      h("div",{class:"toolbar"},
        h("div",{class:"search"},
          h("span",{class:"icon"},"⌕"),
          h("input",{placeholder:"search by username, static ip…", value: state.filters.userQ,
            oninput: e => { state.filters.userQ = e.target.value; renderRoute(); }}),
        ),
        h("div",{class:"filters"},
          ...["all","online","valid","expiring","revoked"].map(s =>
            h("span",{class:"chip"+(sf===s?" active":""), onclick: ()=>{ state.filters.userStatus=s; renderRoute(); }}, s)
          ),
        ),
      ),
      h("div",{style:"max-height:calc(100vh - 280px); overflow:auto"},
        h("table",{class:"users"},
          h("thead",null, h("tr",null,
            h("th",null,"user"), h("th",null,"online"), h("th",null,"cert"),
            h("th",null,"static ip"), h("th",null,"last seen"),
            h("th",null,"cert expires"), h("th",{class:"cell-actions"}),
          )),
          h("tbody",null, filtered.length ? filtered.map(u => userRow(u)) :
            [h("tr",null, h("td",{colspan:7,style:"text-align:center;padding:32px;color:var(--fg-2)"}, "no users match"))]),
        )
      ),
    ),
  ));
}

function userRow(u){
  const expSoon = u.cert_expires && (new Date(u.cert_expires).getTime() - Date.now()) < 30*86400000;
  return h("tr",null,
    h("td",null, h("div",{class:"user-cell"},
      h("div",{class:"av"}, u.username.slice(0,2).toUpperCase()),
      h("div",null, h("div",{class:"name"}, u.username)),
    )),
    h("td",null, onlineBadge(u.online)),
    h("td",null, statusBadge(u.status, expSoon && u.status==="valid")),
    h("td",{class:"tnum"}, u.static_ip || h("span",{class:"faint"},"—")),
    h("td",{class:"muted tnum"}, u.last_seen_at ? fmtRel(u.last_seen_at) : h("span",{class:"faint"},"never")),
    h("td",{class:"muted tnum"}, u.cert_expires ? fmtRel(u.cert_expires) : "—"),
    h("td",{class:"cell-actions"},
      h("div",{class:"row-actions"},
        h("button",{class:"btn btn--sm",title:"download .ovpn", onclick:()=>downloadOVPN(u.username)}, "↓ .ovpn"),
        u.status === "valid"
          ? h("button",{class:"btn btn--sm danger",title:"revoke", onclick:()=>confirmRevoke(u.username)}, "× revoke")
          : null,
      )
    ),
  );
}

function renderLogs(main){
  const all = state.data.logs || [];
  const q = state.filters.logQ.toLowerCase();
  const lvl = state.filters.logLvl;
  const filtered = all.filter(l => (lvl==="all"||l.level===lvl) && (!q || (l.msg||"").toLowerCase().includes(q)));
  main.appendChild(h("div",{class:"page"},
    h("div",{class:"page__head"},
      h("div",null,
        h("h1",{class:"page__title"}, h("span",{class:"prompt"},"$"), " logs"),
        h("div",{class:"page__sub"}, "journalctl -u " + (state.data.dashboard && state.data.dashboard.server && state.data.dashboard.server.unit || "openvpn-server@server")),
      ),
      h("div",{class:"page__actions"}, h("button",{class:"btn btn--ghost", onclick:refresh}, "↻ refresh")),
    ),
    h("div",{class:"table-wrap"},
      h("div",{class:"toolbar"},
        h("div",{class:"search"},
          h("span",{class:"icon"},"⌕"),
          h("input",{placeholder:"grep…", value: state.filters.logQ,
            oninput: e => { state.filters.logQ = e.target.value; renderRoute(); }}),
        ),
        h("div",{class:"filters"},
          ...["all","ok","info","warn","err"].map(s =>
            h("span",{class:"chip"+(lvl===s?" active":""), onclick:()=>{ state.filters.logLvl=s; renderRoute(); }}, s)
          ),
        ),
      ),
      h("div",{class:"log-stream"},
        filtered.length ? filtered.map(l => h("div",{class:"log-line"},
          h("span",{class:"ts"}, l.ts ? fmtDate(l.ts) : "—"),
          h("span",{class:"lvl lvl--"+(l.level||"info")}, "["+(l.level||"info").toUpperCase()+"]"),
          h("span",{class:"msg"}, l.msg || ""),
        )) : h("div",{style:"padding:24px;text-align:center;color:var(--fg-2)"}, "no log entries"),
      ),
    ),
  ));
}

// ---------- actions ----------
async function refresh(skipDashboard){
  try {
    const tasks = [API.users(), API.sessions(), API.logs()];
    if (!skipDashboard) tasks.push(API.dashboard());
    const [users, sessions, logs, dashboard] = await Promise.all(tasks);
    state.data.users = users.users || [];
    state.data.sessions = sessions.sessions || [];
    state.data.logs = logs.logs || [];
    if (dashboard) state.data.dashboard = dashboard;
    renderShell();
  } catch (e) {
    if (e.status === 401) { signOut(); return; }
    Toast.err("refresh failed: " + e.message);
  }
}

function openAddUser(){
  const overlay = h("div",{class:"scrim"});
  let username = "";
  const errLabel = h("div",{class:"err"});
  const input = h("input",{class:"input", autofocus:true, placeholder:"alice",
    oninput: e => { username = e.target.value.trim().toLowerCase(); errLabel.textContent=""; }});
  const submit = async () => {
    if (!/^[a-z0-9_-]{2,32}$/.test(username)) { errLabel.textContent = "lowercase letters, digits, _ or -; 2–32 chars"; return; }
    try {
      Toast.info("issuing cert for " + username + "…");
      await API.addUser(username);
      Toast.ok("user " + username + " created");
      overlay.remove();
      modal.remove();
      await refresh();
    } catch (e) { errLabel.textContent = e.message; }
  };
  const modal = h("div",{class:"modal"},
    h("div",{class:"head"}, h("div",{class:"title"},"Add VPN user")),
    h("div",{class:"body"},
      h("div",{class:"field"},
        h("div",{class:"label"},"username"),
        input,
        errLabel,
        h("div",{style:"font-size:11px;color:var(--fg-3);margin-top:6px"}, "easy-rsa will issue a 10-year client cert and bundle a passwordless .ovpn."),
      ),
    ),
    h("div",{class:"foot"},
      h("button",{class:"btn btn--ghost", onclick: ()=>{overlay.remove(); modal.remove();}}, "cancel"),
      h("button",{class:"btn btn--primary", onclick: submit}, "create"),
    ),
  );
  document.body.appendChild(overlay);
  document.body.appendChild(modal);
  setTimeout(()=>input.focus(), 0);
}

function confirmRevoke(cn){
  const overlay = h("div",{class:"scrim"});
  let typed = "";
  const okBtn = h("button",{class:"btn btn--danger", disabled:true}, "revoke "+cn);
  const inp = h("input",{class:"input", placeholder: cn, oninput: e => { typed = e.target.value; okBtn.disabled = typed !== cn; }});
  okBtn.addEventListener("click", async () => {
    try { await API.revokeUser(cn); Toast.ok("revoked " + cn); overlay.remove(); modal.remove(); await refresh(); }
    catch (e) { Toast.err("revoke failed: " + e.message); }
  });
  const modal = h("div",{class:"modal"},
    h("div",{class:"head"}, h("div",{class:"title"}, "Revoke certificate?")),
    h("div",{class:"body"},
      h("p",{style:"margin:0 0 12px;color:var(--fg-1)"}, "This will revoke ", h("strong",null,cn), " in easy-rsa, regenerate the CRL, and remove the .ovpn file. Active sessions will be terminated on the next CRL reload."),
      h("div",{class:"field"},
        h("div",{class:"label"}, "type ", h("span",{style:"color:var(--danger)"}, cn), " to confirm"), inp),
    ),
    h("div",{class:"foot"},
      h("button",{class:"btn btn--ghost", onclick: ()=>{overlay.remove();modal.remove();}}, "cancel"), okBtn),
  );
  document.body.appendChild(overlay);
  document.body.appendChild(modal);
  setTimeout(()=>inp.focus(), 0);
}

async function downloadOVPN(cn){
  try {
    const t = API.token();
    const res = await fetch(API.configURL(cn), { headers: t ? { Authorization: "Bearer " + t } : {} });
    if (!res.ok) {
      const j = await res.json().catch(()=>({error:res.statusText}));
      throw new Error(j.error || res.statusText);
    }
    const blob = await res.blob();
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = cn + ".ovpn";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
  } catch (e) { Toast.err("download failed: " + e.message); }
}

function signOut(){
  API.setToken("");
  state.user = null;
  renderLogin();
}

// ---------- login ----------
function renderLogin(){
  const root = document.getElementById("root");
  clear(root);
  let user = "admin", pass = "", errMsg = "";
  const errEl = h("div",{class:"err"});
  const submitBtn = h("button",{class:"btn btn--primary", style:"width:100%;height:38px;justify-content:center"}, "sign in ", h("span",{class:"kbd"},"↵"));
  const form = h("form",{class:"auth__card", onsubmit: async e => {
      e.preventDefault();
      if (!user || !pass) { errEl.textContent = "username and password required"; return; }
      submitBtn.disabled = true;
      submitBtn.textContent = "authenticating…";
      try {
        const r = await API.login(user, pass);
        API.setToken(r.token);
        state.user = { username: r.username };
        await refresh();
      } catch (e) {
        submitBtn.disabled = false;
        submitBtn.textContent = "sign in";
        errEl.textContent = e.message || "login failed";
      }
    }},
    h("h1",{class:"auth__title"}, h("span",{class:"accent"},"$"), " sign in"),
    h("div",{class:"auth__sub"},"Authenticate to manage the OpenVPN server."),
    h("div",{class:"field"},
      h("div",{class:"label"},"username"),
      h("input",{class:"input", value:"admin", oninput: e => { user = e.target.value.trim(); errEl.textContent=""; }, autofocus:true}),
    ),
    h("div",{class:"field"},
      h("div",{class:"label"},"password"),
      h("input",{class:"input", type:"password", oninput: e => { pass = e.target.value; errEl.textContent=""; }}),
      errEl,
    ),
    submitBtn,
  );
  root.appendChild(h("div",{class:"auth"},
    h("div",{class:"auth__left"},
      h("div",{class:"auth__brand"}, h("div",{class:"mark"},"▲"),
        h("div",null,
          h("div",{style:"font-size:14px;letter-spacing:.06em"},"OVPN ADMIN"),
          h("div",{style:"font-size:10.5px;color:var(--fg-3);letter-spacing:.1em"},"OPERATIONS CONSOLE"),
        )),
      h("div",{class:"auth__terminal"},
        h("div",{class:"line"}, h("span",{class:"muted"},"[boot] "),"ovpn-admin connected to host"),
        h("div",{class:"line"}, h("span",{class:"ok"},"[ ok ] "),"reading /etc/openvpn/easy-rsa/pki"),
        h("div",{class:"line"}, h("span",{class:"ok"},"[ ok ] "),"tailing /var/log/openvpn/status.log"),
        h("div",{class:"line"}, h("span",{class:"accent"},"[info] "),"awaiting administrator credentials…"),
      ),
    ),
    h("div",{class:"auth__right"}, form),
  ));
}

// ---------- bootstrap ----------
async function boot(){
  if (!API.token()) { renderLogin(); return; }
  try {
    const me = await API.me();
    state.user = me;
    await refresh();
    setInterval(refresh, 10000);
  } catch (e) {
    API.setToken("");
    renderLogin();
  }
}
boot();
</script>
