# China-friendly compose stack. Uses the docker.1ms.run mirror.
# Pair with Dockerfile.local.
#
#   docker compose -f docker-compose.local.yml up -d

services:
  openvpn-mgmt:
    build:
      context: .
      dockerfile: Dockerfile.local
    image: openvpn-admin:local
    container_name: openvpn-mgmt
    restart: unless-stopped
    ports:
      - "8282:8080"
    environment:
      - PORT=8080
      - DB_PATH=/data/openvpn.db
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required — generate with: openssl rand -hex 32}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required — generate with: openssl rand -hex 16}
      - EASYRSA_PATH=/etc/openvpn/easy-rsa
      - OPENVPN_PATH=/etc/openvpn
      - CLIENTS_DIR=/etc/openvpn/clients
      - DASHBOARD_DIR=/app/dashboard
    volumes:
      - ./data:/data
      - openvpn-config:/etc/openvpn
      - openvpn-easyrsa:/etc/openvpn/easy-rsa
      - openvpn-clients:/etc/openvpn/clients
    networks:
      - openvpn-mgmt
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: docker.1ms.run/library/nginx:alpine
    container_name: openvpn-mgmt-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - openvpn-mgmt
    networks:
      - openvpn-mgmt
    profiles:
      - with-nginx

volumes:
  openvpn-config:
  openvpn-easyrsa:
  openvpn-clients:

networks:
  openvpn-mgmt:
    driver: bridge
